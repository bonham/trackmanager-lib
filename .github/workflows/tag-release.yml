name: Tag Release

on:
  push:
    branches: [main]

jobs:
  tag:
    if: "startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"
          git push origin "v$VERSION"
