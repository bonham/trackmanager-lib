name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version increment
        type: choice
        options: [patch, minor, major]
        required: true

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Ensure main branch
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Error: release workflow must run from main branch"
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: version
        run: |
          NEW=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          VERSION=${NEW#v}
          git checkout package.json
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: git checkout -b release/v${{ steps.version.outputs.version }}

      - name: Bump versions
        run: bash scripts/release.sh ${{ steps.version.outputs.version }}

      - name: Commit and push branch
        run: |
          git add package.json packages/*/package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push --force origin release/v${{ steps.version.outputs.version }}

      - name: Open PR
        run: |
          gh pr create \
            --title "chore: release v${{ steps.version.outputs.version }}" \
            --body "Automated version bump. Merge to trigger publish and docs." \
            --base main \
            --head release/v${{ steps.version.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
